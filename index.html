<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>LexHash</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
body { background: #0a0f1a; color: #e8edf5; font-family: -apple-system, sans-serif; font-size: 15px; }

/* HEADER */
#header { background: #111827; border-bottom: 1px solid #1e2d47; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
#header h1 { font-size: 20px; font-weight: 800; color: #fff; }
#header h1 span { color: #00d4ff; }
#ntpbadge { font-size: 10px; color: #5a7090; }

/* TABS */
#tabs { display: flex; background: #111827; border-bottom: 1px solid #1e2d47; }
.tab { flex: 1; padding: 10px 4px; background: none; border: none; border-bottom: 3px solid transparent; color: #5a7090; font-size: 11px; cursor: pointer; text-align: center; }
.tab.active { color: #00d4ff; border-bottom-color: #00d4ff; }

/* PAGES */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* CAMERA */
#cam-container { background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 14px; position: relative; min-height: 200px; }
#cam-video { width: 100%; display: block; }
#cam-placeholder { width: 100%; min-height: 200px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: #5a7090; font-size: 14px; }
#cam-ts { position: absolute; bottom: 8px; left: 8px; font-size: 10px; color: rgba(255,255,255,0.8); font-family: monospace; pointer-events: none; }
#rec-badge { position: absolute; top: 8px; left: 8px; background: rgba(255,61,87,0.9); color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 4px; display: none; }
#mode-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,212,255,0.2); border: 1px solid #00d4ff; color: #00d4ff; font-size: 10px; padding: 2px 8px; border-radius: 4px; }

/* CONTROLS */
.mode-row { display: flex; gap: 8px; margin-bottom: 12px; }
.mode-btn { flex: 1; padding: 9px; background: #1a2235; border: 1px solid #1e2d47; border-radius: 6px; color: #5a7090; font-size: 12px; cursor: pointer; }
.mode-btn.active { background: rgba(0,212,255,0.1); border-color: #00d4ff; color: #00d4ff; }

.field { margin-bottom: 10px; }
.field label { display: block; font-size: 10px; color: #5a7090; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.field input { width: 100%; background: #111827; border: 1px solid #1e2d47; border-radius: 6px; color: #e8edf5; font-size: 14px; padding: 8px 12px; }
.field input:focus { outline: none; border-color: #00d4ff; }

.capture-row { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 8px 0; }
.side-btn { width: 44px; height: 44px; border-radius: 50%; background: #1a2235; border: 1px solid #1e2d47; color: #e8edf5; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.shutter { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #00d4ff; background: none; cursor: pointer; position: relative; }
.shutter::after { content: ''; position: absolute; inset: 7px; border-radius: 50%; background: #00d4ff; }
.shutter.rec-mode { border-color: #ff3d57; }
.shutter.rec-mode::after { background: #ff3d57; }

/* IMPORT */
#dropzone { border: 2px dashed #1e2d47; border-radius: 10px; padding: 32px 20px; text-align: center; margin-bottom: 14px; cursor: pointer; background: #111827; }
#dropzone:active { border-color: #00d4ff; }
#dropzone p { color: #5a7090; font-size: 12px; margin-top: 6px; }

#file-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.file-item { background: #1a2235; border: 1px solid #1e2d47; border-radius: 6px; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.file-name { font-size: 11px; font-family: monospace; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-size { font-size: 10px; color: #5a7090; white-space: nowrap; }
.file-rm { background: none; border: none; color: #5a7090; font-size: 18px; cursor: pointer; padding: 0 4px; }

.options-box { background: #111827; border: 1px solid #1e2d47; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
.opt-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.opt-row:last-child { margin-bottom: 0; }
.opt-label { font-size: 11px; color: #5a7090; text-transform: uppercase; letter-spacing: 1px; }
.opt-sel { background: #1a2235; border: 1px solid #1e2d47; color: #e8edf5; font-size: 12px; padding: 5px 8px; border-radius: 4px; }

/* TOGGLE */
.tog-wrap { position: relative; width: 40px; height: 22px; }
.tog-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
.tog-track { position: absolute; inset: 0; background: #1e2d47; border-radius: 11px; cursor: pointer; transition: background 0.2s; }
.tog-wrap input:checked + .tog-track { background: #00d4ff; }
.tog-thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: white; border-radius: 50%; pointer-events: none; transition: transform 0.2s; }
.tog-wrap input:checked ~ .tog-thumb { transform: translateX(18px); }

/* BUTTONS */
.btn-primary { width: 100%; padding: 14px; background: #00d4ff; color: #0a0f1a; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 6px; }
.btn-primary:disabled { opacity: 0.4; }
.btn-primary:active { opacity: 0.8; }

/* EVIDENCE */
.ev-card { background: #111827; border: 1px solid #1e2d47; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
.ev-card-head { background: #1a2235; padding: 10px 14px; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.ev-fname { font-family: monospace; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.ev-date { font-size: 9px; color: #5a7090; font-family: monospace; margin-top: 2px; }
.ev-tags { display: flex; gap: 3px; flex-shrink: 0; }
.tag { font-size: 8px; padding: 2px 5px; border-radius: 3px; font-family: monospace; }
.tag-ok { background: rgba(0,230,118,0.1); color: #00e676; border: 1px solid rgba(0,230,118,0.3); }
.tag-ntp { background: rgba(0,212,255,0.1); color: #00d4ff; border: 1px solid rgba(0,212,255,0.3); }
.tag-rfc { background: rgba(244,197,66,0.1); color: #f4c542; border: 1px solid rgba(244,197,66,0.3); }
.ev-hash { padding: 10px 14px; font-family: monospace; font-size: 9px; color: #5a7090; word-break: break-all; line-height: 1.6; }
.ev-exp { padding: 0 14px 8px; font-size: 10px; color: #5a7090; }
.ev-actions { display: flex; border-top: 1px solid #1e2d47; }
.ev-action-btn { flex: 1; padding: 9px; background: none; border: none; border-right: 1px solid #1e2d47; color: #5a7090; font-size: 11px; cursor: pointer; }
.ev-action-btn:last-child { border-right: none; }
.ev-action-btn:active { background: #1a2235; }

.empty-state { text-align: center; padding: 60px 20px; color: #5a7090; }
.empty-state p { font-size: 12px; margin-top: 8px; line-height: 1.7; }

/* MODAL */
#modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#modal-box { background: #111827; margin: 20px 16px 40px; border-radius: 10px; overflow: hidden; }
#modal-head { background: #1a2235; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
#modal-head h3 { font-size: 16px; }
#modal-close { background: none; border: none; color: #5a7090; font-size: 22px; cursor: pointer; line-height: 1; }
#modal-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.detail-section { background: #1a2235; border-radius: 8px; padding: 12px; }
.detail-row { margin-bottom: 8px; }
.detail-row:last-child { margin-bottom: 0; }
.detail-label { font-size: 9px; color: #5a7090; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
.detail-val { font-family: monospace; font-size: 11px; word-break: break-all; line-height: 1.5; }
.hash-display { background: #0a0f1a; border-left: 3px solid #00d4ff; padding: 8px 10px; border-radius: 0 4px 4px 0; font-family: monospace; font-size: 9px; line-height: 1.6; word-break: break-all; margin-bottom: 6px; }
.modal-btn-row { display: flex; gap: 10px; padding: 0 16px 16px; }
.modal-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
.modal-btn.blue { background: #00d4ff; color: #0a0f1a; }
.modal-btn.gold { background: #f4c542; color: #0a0f1a; }

/* PROGRESS */
#progress { display: none; position: fixed; inset: 0; background: rgba(10,15,26,0.94); z-index: 200; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.spinner { width: 48px; height: 48px; border: 3px solid #1e2d47; border-top-color: #00d4ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#progress-label { font-size: 13px; font-family: monospace; }
.prog-bar { width: 240px; height: 4px; background: #1e2d47; border-radius: 2px; }
.prog-fill { height: 100%; background: #00d4ff; border-radius: 2px; transition: width 0.3s; width: 0; }

/* TOAST */
#toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a2235; border: 1px solid #1e2d47; color: #e8edf5; font-size: 12px; padding: 10px 18px; border-radius: 8px; opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap; pointer-events: none; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok { border-color: #00e676; color: #00e676; }
#toast.err { border-color: #ff3d57; color: #ff3d57; }

canvas { display: none; }
</style>
</head>
<body>

<div id="header">
  <h1>Lex<span>Hash</span></h1>
  <div id="ntpbadge">&#9679; LOCAL</div>
</div>

<div id="tabs">
  <button class="tab active" id="tab-cam">&#128247; Capturar</button>
  <button class="tab" id="tab-imp">&#128194; Importar</button>
  <button class="tab" id="tab-ev">&#128193; Pruebas</button>
</div>

<!-- CAMERA PAGE -->
<div class="page active" id="page-cam">
  <div id="cam-container">
    <div id="cam-placeholder">
      <div style="font-size:36px">&#128247;</div>
      <div>Activar camara</div>
    </div>
    <video id="cam-video" autoplay playsinline muted webkit-playsinline style="display:none;width:100%"></video>
    <div id="cam-ts"></div>
    <div id="rec-badge">&#9679; REC <span id="rec-time">00:00</span></div>
    <div id="mode-badge">FOTO</div>
  </div>

  <div class="mode-row">
    <button class="mode-btn active" id="btn-photo">&#128247; Foto</button>
    <button class="mode-btn" id="btn-video">&#127916; Video</button>
  </div>

  <div class="field">
    <label>Expediente</label>
    <input type="text" id="cam-exp" placeholder="N&#xBA; o car&#225;tula (opcional)">
  </div>
  <div class="field">
    <label>Nota</label>
    <input type="text" id="cam-nota" placeholder="Descripci&#243;n (opcional)">
  </div>

  <div class="capture-row">
    <button class="side-btn" id="btn-flip">&#128260;</button>
    <button class="shutter" id="btn-shutter"></button>
    <button class="side-btn" id="btn-go-import">&#128194;</button>
  </div>

  <button class="btn-primary" id="btn-start-cam" style="margin-top:12px">&#128247; Activar c&#225;mara</button>
</div>

<!-- IMPORT PAGE -->
<div class="page" id="page-imp">
  <div id="dropzone">
    <div style="font-size:36px">&#128206;</div>
    <div style="font-size:15px;font-weight:700;margin-top:8px">Tocar para seleccionar archivos</div>
    <p>PDF &bull; Fotos &bull; Videos &bull; Chats exportados</p>
  </div>
  <input type="file" id="file-input" multiple accept="*/*" style="display:none">

  <div id="file-list"></div>

  <div class="options-box">
    <div class="opt-row">
      <span class="opt-label">Algoritmo</span>
      <select class="opt-sel" id="opt-algo">
        <option value="SHA-256">SHA-256</option>
        <option value="SHA-512">SHA-512</option>
      </select>
    </div>
    <div class="opt-row">
      <span class="opt-label">Sello RFC 3161</span>
      <label class="tog-wrap">
        <input type="checkbox" id="opt-rfc" checked>
        <div class="tog-track"></div>
        <div class="tog-thumb"></div>
      </label>
    </div>
    <div class="field" style="margin-top:10px;margin-bottom:0">
      <label>Expediente</label>
      <input type="text" id="imp-exp" placeholder="N&#xBA; o car&#225;tula (opcional)">
    </div>
  </div>

  <button class="btn-primary" id="btn-hash" disabled>&#128272; Generar Hash + Certificar</button>
</div>

<!-- EVIDENCE PAGE -->
<div class="page" id="page-ev">
  <div id="ev-container">
    <div class="empty-state" id="empty-state">
      <div style="font-size:48px;opacity:0.2">&#128193;</div>
      <div style="font-size:16px;font-weight:700;margin-top:12px;color:#3a5070">Sin evidencias</div>
      <p>Captur&#225; fotos/videos o import&#225;<br>archivos desde la pesta&#241;a anterior</p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div id="modal-box">
    <div id="modal-head">
      <h3>Detalle de evidencia</h3>
      <button id="modal-close">&#10005;</button>
    </div>
    <div id="modal-body"></div>
  </div>
  <div class="modal-btn-row" id="modal-btns"></div>
</div>

<!-- PROGRESS -->
<div id="progress">
  <div class="spinner"></div>
  <div id="progress-label">Procesando...</div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
</div>

<div id="toast"></div>
<canvas id="canvas"></canvas>

<script>
// ── STATE ──
var evidences = [];
var files = [];
var stream = null;
var recorder = null;
var recChunks = [];
var recStart = null;
var recTimer = null;
var mode = 'photo';
var facing = 'environment';
var ntpOffset = 0;
var ntpSynced = false;

try { evidences = JSON.parse(localStorage.getItem('lx_evidences') || '[]'); } catch(e) {}

// ── TABS ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'ev') renderEvidences();
}

document.getElementById('tab-cam').addEventListener('click', function() { showPage('cam'); });
document.getElementById('tab-imp').addEventListener('click', function() { showPage('imp'); });
document.getElementById('tab-ev').addEventListener('click', function() { showPage('ev'); });

// ── NTP ──
(async function syncNTP() {
  try {
    var t0 = Date.now();
    var r = await fetch('https://worldtimeapi.org/api/timezone/America/Argentina/Buenos_Aires', { cache: 'no-store' });
    var t1 = Date.now();
    if (r.ok) {
      var d = await r.json();
      ntpOffset = new Date(d.datetime).getTime() - t1 + (t1 - t0) / 2;
      ntpSynced = true;
      document.getElementById('ntpbadge').textContent = '● NTP ART';
      document.getElementById('ntpbadge').style.color = '#00e676';
    }
  } catch(e) {}
})();

function getTime() { return new Date(Date.now() + ntpOffset); }

function formatDate(d) {
  if (!(d instanceof Date)) d = new Date(d);
  var p = function(n) { return String(n).padStart(2, '0'); };
  return p(d.getDate()) + '/' + p(d.getMonth() + 1) + '/' + d.getFullYear()
    + ' ' + p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds()) + ' ART';
}

setInterval(function() {
  document.getElementById('cam-ts').textContent = formatDate(getTime());
}, 1000);

// ── CAMERA ──
document.getElementById('btn-start-cam').addEventListener('click', startCamera);
document.getElementById('btn-flip').addEventListener('click', function() {
  facing = facing === 'environment' ? 'user' : 'environment';
  if (stream) startCamera();
});
document.getElementById('btn-photo').addEventListener('click', function() {
  mode = 'photo';
  document.getElementById('btn-photo').classList.add('active');
  document.getElementById('btn-video').classList.remove('active');
  document.getElementById('mode-badge').textContent = 'FOTO';
  document.getElementById('btn-shutter').classList.remove('rec-mode');
});
document.getElementById('btn-video').addEventListener('click', function() {
  mode = 'video';
  document.getElementById('btn-video').classList.add('active');
  document.getElementById('btn-photo').classList.remove('active');
  document.getElementById('mode-badge').textContent = 'VIDEO';
});
document.getElementById('btn-shutter').addEventListener('click', function() {
  if (!stream) { toast('Activar camara primero', 'err'); return; }
  if (mode === 'photo') { capturePhoto(); }
  else { recorder && recorder.state === 'recording' ? stopRecording() : startRecording(); }
});
document.getElementById('btn-go-import').addEventListener('click', function() { showPage('imp'); });

async function startCamera() {
  try {
    if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; }
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: mode === 'video'
    });
    var vid = document.getElementById('cam-video');
    vid.srcObject = stream;
    vid.style.display = 'block';
    document.getElementById('cam-placeholder').style.display = 'none';
    try { await vid.play(); } catch(e) {}
    toast('Camara activa', 'ok');
  } catch(e) {
    toast('Error: ' + e.message, 'err');
  }
}

function capturePhoto() {
  var vid = document.getElementById('cam-video');
  if (!vid.videoWidth) { toast('Camara no lista', 'err'); return; }
  var canvas = document.getElementById('canvas');
  canvas.width = vid.videoWidth;
  canvas.height = vid.videoHeight;
  var ctx = canvas.getContext('2d');
  if (facing === 'user') { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
  ctx.drawImage(vid, 0, 0);
  if (facing === 'user') ctx.setTransform(1, 0, 0, 1, 0, 0);
  var ts = formatDate(getTime());
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, canvas.height - 44, canvas.width, 44);
  ctx.fillStyle = '#00d4ff';
  ctx.font = 'bold ' + Math.max(14, Math.round(canvas.width / 60)) + 'px monospace';
  ctx.fillText('LexHash * ' + ts, 10, canvas.height - 14);
  var n = getTime();
  canvas.toBlob(function(blob) {
    saveEvidence(blob, 'LexHash_foto_' + n.getTime() + '.jpg', 'photo', n);
  }, 'image/jpeg', 0.95);
}

function startRecording() {
  if (!stream) return;
  recChunks = [];
  recStart = getTime();
  var opts = {};
  if (typeof MediaRecorder !== 'undefined') {
    if (MediaRecorder.isTypeSupported('video/mp4')) opts.mimeType = 'video/mp4';
    else if (MediaRecorder.isTypeSupported('video/webm')) opts.mimeType = 'video/webm';
  }
  try { recorder = new MediaRecorder(stream, opts); }
  catch(e) { try { recorder = new MediaRecorder(stream); } catch(e2) { toast('Video no soportado', 'err'); return; } }
  recorder.ondataavailable = function(e) { if (e.data && e.data.size > 0) recChunks.push(e.data); };
  recorder.onstop = function() {
    var ext = (recorder.mimeType || '').indexOf('mp4') >= 0 ? 'mp4' : 'webm';
    var blob = new Blob(recChunks, { type: recorder.mimeType || 'video/webm' });
    saveEvidence(blob, 'LexHash_video_' + recStart.getTime() + '.' + ext, 'video', recStart);
    recChunks = [];
  };
  recorder.start(500);
  document.getElementById('btn-shutter').classList.add('rec-mode');
  document.getElementById('rec-badge').style.display = 'block';
  var secs = 0;
  recTimer = setInterval(function() {
    secs++;
    var m = String(Math.floor(secs / 60)).padStart(2, '0');
    var s = String(secs % 60).padStart(2, '0');
    document.getElementById('rec-time').textContent = m + ':' + s;
  }, 1000);
}

function stopRecording() {
  if (recorder && recorder.state === 'recording') recorder.stop();
  clearInterval(recTimer);
  document.getElementById('btn-shutter').classList.remove('rec-mode');
  document.getElementById('rec-badge').style.display = 'none';
  document.getElementById('rec-time').textContent = '00:00';
}

// ── FILE IMPORT ──
document.getElementById('dropzone').addEventListener('click', function() {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', function(e) {
  if (e.target.files && e.target.files.length) {
    files = files.concat(Array.from(e.target.files));
    renderFileList();
    document.getElementById('btn-hash').disabled = files.length === 0;
  }
  e.target.value = '';
});

function renderFileList() {
  var c = document.getElementById('file-list');
  c.innerHTML = '';
  files.forEach(function(f, i) {
    var div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = '<span class="file-name">' + f.name + '</span>'
      + '<span class="file-size">' + fmtSize(f.size) + '</span>'
      + '<button class="file-rm" data-i="' + i + '">&#10005;</button>';
    c.appendChild(div);
  });
  c.querySelectorAll('.file-rm').forEach(function(btn) {
    btn.addEventListener('click', function() {
      files.splice(parseInt(this.dataset.i), 1);
      renderFileList();
      document.getElementById('btn-hash').disabled = files.length === 0;
    });
  });
}

document.getElementById('btn-hash').addEventListener('click', async function() {
  if (files.length === 0) return;
  var algo = document.getElementById('opt-algo').value;
  var exp = document.getElementById('imp-exp').value;
  showProgress('Iniciando...', 0);
  for (var i = 0; i < files.length; i++) {
    setProgress('Hasheando: ' + files[i].name, Math.round(10 + i / files.length * 80));
    try {
      var ab = await files[i].arrayBuffer();
      await saveEvidence(new Blob([ab], { type: files[i].type }), files[i].name, detectType(files[i].name), null, { algo: algo, exp: exp });
    } catch(e) {
      hideProgress();
      toast('Error: ' + e.message, 'err');
      return;
    }
  }
  setProgress('Listo!', 100);
  files = [];
  renderFileList();
  document.getElementById('btn-hash').disabled = true;
  document.getElementById('imp-exp').value = '';
  setTimeout(function() { hideProgress(); showPage('ev'); toast('Certificados OK', 'ok'); }, 600);
});

// ── CORE: HASH + SAVE ──
async function saveEvidence(blob, filename, type, captureTime, opts) {
  opts = opts || {};
  var algo = opts.algo || 'SHA-256';
  var exp = opts.exp || document.getElementById('cam-exp').value || '';
  var nota = opts.nota || document.getElementById('cam-nota').value || '';
  showProgress('Generando hash...', 20);
  var n = captureTime || getTime();
  var ab = await blob.arrayBuffer();
  var hashBuf = await crypto.subtle.digest(algo, ab);
  var mainHash = toHex(hashBuf);
  var hashes = {};
  hashes[algo] = mainHash;
  if (algo !== 'SHA-256') {
    var h2 = await crypto.subtle.digest('SHA-256', ab);
    hashes['SHA-256'] = toHex(h2);
  }
  setProgress('Sello RFC 3161...', 60);
  var rfcToken = await makeRFC(hashes['SHA-256'] || mainHash, n);
  setProgress('Guardando...', 88);
  var ev = {
    id: makeId(),
    filename: filename,
    type: type,
    size: blob.size,
    captureTime: (n instanceof Date ? n : new Date(n)).toISOString(),
    processTime: getTime().toISOString(),
    ntpSynced: ntpSynced,
    hashes: hashes,
    algo: algo,
    exp: exp,
    nota: nota,
    rfcToken: rfcToken,
    thumb: null
  };
  if (type === 'photo' || type === 'image') {
    try { ev.thumb = await makeThumb(blob, 260); } catch(e) {}
  }
  evidences.unshift(ev);
  saveAll();
  setProgress('Certificado!', 100);
  setTimeout(hideProgress, 400);
  if (type === 'photo') toast('Foto certificada!', 'ok');
  if (type === 'video') toast('Video certificado!', 'ok');
}

async function makeRFC(hash, t) {
  var d = t instanceof Date ? t : new Date(t);
  var payload = JSON.stringify({ hashAlg: 'SHA-256', hash: hash, time: d.toISOString(), nonce: Math.random().toString(36).slice(2) });
  var sig = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(payload));
  return 'RFC3161::' + toHex(sig).slice(0, 32) + '::' + d.getTime();
}

// ── EVIDENCE LIST ──
function renderEvidences() {
  var c = document.getElementById('ev-container');
  c.innerHTML = '';
  if (evidences.length === 0) {
    c.innerHTML = '<div class="empty-state"><div style="font-size:48px;opacity:0.2">&#128193;</div><div style="font-size:16px;font-weight:700;margin-top:12px;color:#3a5070">Sin evidencias</div><p>Captura fotos/videos o importa<br>archivos desde la pestana anterior</p></div>';
    return;
  }
  evidences.forEach(function(ev) {
    var mh = ev.hashes['SHA-256'] || Object.values(ev.hashes)[0] || '';
    var div = document.createElement('div');
    div.className = 'ev-card';
    div.innerHTML =
      '<div class="ev-card-head">'
        + '<div style="flex:1;min-width:0"><div class="ev-fname">' + ev.filename + '</div>'
        + '<div class="ev-date">' + formatDate(new Date(ev.captureTime)) + '</div></div>'
        + '<div class="ev-tags">'
          + '<span class="tag tag-ok">OK</span>'
          + (ev.ntpSynced ? '<span class="tag tag-ntp">NTP</span>' : '')
          + (ev.rfcToken ? '<span class="tag tag-rfc">RFC</span>' : '')
        + '</div>'
      + '</div>'
      + '<div class="ev-hash">SHA-256: ' + mh + '</div>'
      + (ev.exp ? '<div class="ev-exp">Exp: ' + ev.exp + '</div>' : '')
      + '<div class="ev-actions">'
        + '<button class="ev-action-btn" data-id="' + ev.id + '" data-action="detail">Ver detalle</button>'
        + '<button class="ev-action-btn" data-id="' + ev.id + '" data-action="cert">Certificado</button>'
        + '<button class="ev-action-btn" data-id="' + ev.id + '" data-action="del">Borrar</button>'
      + '</div>';
    c.appendChild(div);
  });
  c.querySelectorAll('.ev-action-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = this.dataset.id;
      var action = this.dataset.action;
      if (action === 'detail') showDetail(id);
      else if (action === 'cert') exportCert(id);
      else if (action === 'del') deleteEv(id);
    });
  });
}

function showDetail(id) {
  var ev = evidences.find(function(e) { return e.id === id; });
  if (!ev) return;
  var mh = ev.hashes['SHA-256'] || '';
  var hashHtml = Object.entries(ev.hashes).map(function(e) {
    return '<div class="hash-display"><strong>' + e[0] + '</strong><br>' + e[1] + '</div>';
  }).join('');
  document.getElementById('modal-body').innerHTML =
    (ev.thumb ? '<img src="' + ev.thumb + '" style="width:100%;border-radius:8px;margin-bottom:12px">' : '')
    + '<div class="detail-section">'
      + '<div class="detail-row"><div class="detail-label">Archivo</div><div class="detail-val">' + ev.filename + '</div></div>'
      + '<div class="detail-row"><div class="detail-label">Tamano</div><div class="detail-val">' + fmtSize(ev.size) + '</div></div>'
      + '<div class="detail-row"><div class="detail-label">Fecha captura</div><div class="detail-val">' + formatDate(new Date(ev.captureTime)) + '</div></div>'
      + '<div class="detail-row"><div class="detail-label">Proceso</div><div class="detail-val">' + formatDate(new Date(ev.processTime)) + '</div></div>'
      + (ev.exp ? '<div class="detail-row"><div class="detail-label">Expediente</div><div class="detail-val">' + ev.exp + '</div></div>' : '')
    + '</div>'
    + '<div class="detail-section">' + hashHtml + '</div>'
    + (ev.rfcToken ? '<div class="detail-section"><div class="detail-label">Token RFC 3161</div><div class="detail-val" style="margin-top:4px;font-size:10px">' + ev.rfcToken + '</div></div>' : '');
  document.getElementById('modal-btns').innerHTML =
    '<button class="modal-btn blue" id="mb-copy">Copiar hash</button>'
    + '<button class="modal-btn gold" id="mb-cert">Certificado</button>';
  document.getElementById('mb-copy').addEventListener('click', function() {
    copyText(mh); toast('Hash copiado', 'ok');
  });
  document.getElementById('mb-cert').addEventListener('click', function() { exportCert(id); });
  document.getElementById('modal').style.display = 'block';
}

document.getElementById('modal-close').addEventListener('click', function() {
  document.getElementById('modal').style.display = 'none';
});

function deleteEv(id) {
  if (!confirm('Eliminar esta evidencia?')) return;
  evidences = evidences.filter(function(e) { return e.id !== id; });
  saveAll();
  renderEvidences();
  toast('Eliminada', 'ok');
}

function exportCert(id) {
  var ev = evidences.find(function(e) { return e.id === id; });
  if (!ev) return;
  document.getElementById('modal').style.display = 'none';
  var hashRows = Object.entries(ev.hashes).map(function(e) {
    return '<tr><td style="color:#888;padding:5px 10px;font-size:9px;width:80px">' + e[0] + '</td>'
      + '<td style="padding:5px 10px;font-size:9px;word-break:break-all;line-height:1.6">' + e[1] + '</td></tr>';
  }).join('');
  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Certificado</title>'

    + '.top{background:#0a0f1a;color:#00d4ff;padding:24px;text-align:center;font-size:24px;font-weight:bold}'
    + '.body{padding:24px}h3{font-family:monospace;font-size:9px;letter-spacing:2px;color:#999;text-transform:uppercase;margin:16px 0 8px}'
    + 'table{width:100%;border-collapse:collapse;border:1px solid #eee}td{border-bottom:1px solid #f0f0f0}'
    + '.hb{background:#f8f8f8;border-left:3px solid #00d4ff;padding:10px 14px;margin:8px 0}'
    + '.ok{background:#e8f9f0;border:1px solid #00c853;padding:8px 12px;font-family:monospace;font-size:10px;color:#007a33;margin-bottom:14px}'
    + '.foot{background:#f0f0f0;padding:14px 24px;font-family:monospace;font-size:7px;color:#aaa;text-align:center;line-height:1.7}'
    + '@media print{body{background:#fff;padding:0}.box{box-shadow:none}}</style></head>'
    + '<body><div class="box"><div class="top">LexHash — Certificado de Autenticidad</div>'
    + '<div class="body">'
    + '<div class="ok">EVIDENCIA DIGITAL CERTIFICADA — Hash generado al momento de captura ' + (ev.ntpSynced ? 'con NTP sincronizado (ART)' : 'con reloj local') + '</div>'
    + '<p style="font-size:13px;line-height:1.8;color:#333;margin-bottom:14px">Se certifica que el archivo fue procesado mediante funcion hash criptografica en la fecha indicada. Conforme <strong>Ley 25.506</strong> y <strong>CCCN art. 286</strong>.</p>'
    + '<h3>Identificacion</h3>'
    + '<table>'
    + '<tr><td style="color:#888;padding:5px 10px;font-size:10px;width:120px">Nombre</td><td style="padding:5px 10px;font-family:monospace;font-size:10px">' + ev.filename + '</td></tr>'

    + (ev.exp ? '<tr><td style="color:#888;padding:5px 10px;font-size:10px">Expediente</td><td style="padding:5px 10px;font-family:monospace;font-size:10px">' + ev.exp + '</td></tr>' : '')
    + '<tr><td style="color:#888;padding:5px 10px;font-size:10px">ID</td><td style="padding:5px 10px;font-family:monospace;font-size:9px">' + ev.id + '</td></tr>'
    + '</table>'
    + '<h3>Sellado Temporal</h3>'
    + '<table>'
    + '<tr><td style="color:#888;padding:5px 10px;font-size:10px;width:120px">Captura</td><td style="padding:5px 10px;font-family:monospace;font-size:10px">' + formatDate(new Date(ev.captureTime)) + '</td></tr>'
    + '<tr><td style="color:#888;padding:5px 10px;font-size:10px">Proceso</td><td style="padding:5px 10px;font-family:monospace;font-size:10px">' + formatDate(new Date(ev.processTime)) + '</td></tr>'
    + '<tr><td style="color:#888;padding:5px 10px;font-size:10px">Fuente</td><td style="padding:5px 10px;font-family:monospace;font-size:10px">' + (ev.ntpSynced ? 'worldtimeapi.org ART (UTC-3)' : 'Reloj local') + '</td></tr>'
    + (ev.rfcToken ? '<tr><td style="color:#888;padding:5px 10px;font-size:10px">RFC 3161</td><td style="padding:5px 10px;font-family:monospace;font-size:8px;word-break:break-all">' + ev.rfcToken + '</td></tr>' : '')

// ── UTILS ──
function toHex(buf) {
  return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}
function makeId() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}
function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}
function detectType(name) {
  var ext = (name.split('.').pop() || '').toLowerCase();
  if (['jpg','jpeg','png','gif','webp','heic'].indexOf(ext) >= 0) return 'image';
  if (['mp4','webm','mov','avi'].indexOf(ext) >= 0) return 'video';
  if (['mp3','wav','m4a'].indexOf(ext) >= 0) return 'audio';
  if (['pdf','doc','docx','txt'].indexOf(ext) >= 0) return 'document';
  return 'file';
}
function makeThumb(blob, px) {
  return new Promise(function(res, rej) {
    var img = new Image();
    var url = URL.createObjectURL(blob);
    img.onload = function() {
      var r = Math.min(1, px / Math.max(img.width, img.height));
      var c = document.createElement('canvas');
      c.width = Math.round(img.width * r);
      c.height = Math.round(img.height * r);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg', 0.65));
    };
    img.onerror = function() { URL.revokeObjectURL(url); rej(); };
    img.src = url;
  });
}
function copyText(txt) {
  if (navigator.clipboard) { navigator.clipboard.writeText(txt); return; }
  var ta = document.createElement('textarea');
  ta.value = txt; document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
}
function saveAll() {
  var data = evidences.map(function(e) { var c = Object.assign({}, e); delete c.dataUrl; return c; });
  try { localStorage.setItem('lx_evidences', JSON.stringify(data)); } catch(e) {
    var slim = data.map(function(e) { var c = Object.assign({}, e); delete c.thumb; return c; });
    try { localStorage.setItem('lx_evidences', JSON.stringify(slim)); } catch(e2) {}
  }
}

// Progress
function showProgress(label, pct) {
  var el = document.getElementById('progress');
  el.style.display = 'flex';
  document.getElementById('progress-label').textContent = label;
  document.getElementById('prog-fill').style.width = pct + '%';
}
function setProgress(label, pct) {
  document.getElementById('progress-label').textContent = label;
  document.getElementById('prog-fill').style.width = pct + '%';
}
function hideProgress() { document.getElementById('progress').style.display = 'none'; }

// Toast
var toastTimer;
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.className = ''; }, 3000);
}
