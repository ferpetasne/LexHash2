<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test</title>
<style>
body{background:#0a0f1a;color:#fff;font-family:monospace;padding:20px;font-size:16px}
button{display:block;width:100%;padding:20px;margin:10px 0;font-size:18px;background:#00d4ff;color:#000;border:none;border-radius:8px}
#log{margin-top:20px;padding:10px;background:#111;border-radius:8px;font-size:13px;line-height:1.8}
</style>
</head>
<body>
<h2 style="color:#00d4ff">LexHash — Test v7</h2>
<p id="status" style="color:#f4c542">Si ves esto el archivo NUEVO esta cargado</p>
<button onclick="log('Boton 1 funciona OK')">Tocar aqui — Prueba 1</button>
<button onclick="log('Boton 2 funciona OK')">Tocar aqui — Prueba 2</button>
<button onclick="testCam()">Probar camara</button>
<button onclick="testHash()">Probar hash</button>
<div id="log">Esperando...</div>
<script>
function log(msg){
  var d=document.getElementById('log');
  d.innerHTML=d.innerHTML+'<br>✓ '+msg;
}
async function testCam(){
  try{
    var s=await navigator.mediaDevices.getUserMedia({video:true});
    s.getTracks().forEach(function(t){t.stop();});
    log('Camara: OK');
  }catch(e){log('Camara ERROR: '+e.message);}
}
async function testHash(){
  try{
    var ab=new TextEncoder().encode('test');
    var h=await crypto.subtle.digest('SHA-256',ab);
    var hex=Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    log('Hash SHA-256: '+hex.slice(0,20)+'...');
  }catch(e){log('Hash ERROR: '+e.message);}
}
document.addEventListener('DOMContentLoaded',function(){
  log('JS cargado correctamente');
  log('User agent: '+navigator.userAgent.slice(0,60));
});
</script>
</body>
</html>
